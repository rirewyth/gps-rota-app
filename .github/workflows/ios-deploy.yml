name: iOS Build and TestFlight Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: macos-latest
    timeout-minutes: 120

    steps:
      - name: Kodlari Al
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Flutter Kurulumu
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Swift Package Manager Devre Disi Birak
        run: flutter config --no-enable-swift-package-manager

      - name: Flutter Bagimliliklar
        working-directory: mountaineering_app
        run: flutter pub get

      - name: Eksik iOS Dosyalarini Olustur
        working-directory: mountaineering_app
        run: flutter create . --platforms ios

      - name: Uygulama Ikonu ve Splash Olustur
        working-directory: mountaineering_app
        run: |
          flutter pub run flutter_launcher_icons
          flutter pub run flutter_native_splash:create

      - name: Info.plist Anahtarlarini Ekle
        working-directory: mountaineering_app/ios/Runner
        run: |
          plutil -replace ITSAppUsesNonExemptEncryption -bool NO Info.plist 2>/dev/null || plutil -insert ITSAppUsesNonExemptEncryption -bool NO Info.plist
          plutil -replace NSLocationWhenInUseUsageDescription -string "Konum izni gereklidir." Info.plist 2>/dev/null || plutil -insert NSLocationWhenInUseUsageDescription -string "Konum izni gereklidir." Info.plist
          plutil -replace NSLocationAlwaysUsageDescription -string "Arka planda konum gereklidir." Info.plist 2>/dev/null || plutil -insert NSLocationAlwaysUsageDescription -string "Arka planda konum gereklidir." Info.plist
          plutil -replace NSLocationAlwaysAndWhenInUseUsageDescription -string "Arka planda konum gereklidir." Info.plist 2>/dev/null || plutil -insert NSLocationAlwaysAndWhenInUseUsageDescription -string "Arka planda konum gereklidir." Info.plist
          plutil -replace NSMicrophoneUsageDescription -string "Mikrofon erisimi gereklidir." Info.plist 2>/dev/null || plutil -insert NSMicrophoneUsageDescription -string "Mikrofon erisimi gereklidir." Info.plist
          plutil -replace NSUserTrackingUsageDescription -string "Reklam kisisellestirme icin izin gereklidir." Info.plist 2>/dev/null || plutil -insert NSUserTrackingUsageDescription -string "Reklam kisisellestirme icin izin gereklidir." Info.plist
          plutil -replace NSCameraUsageDescription -string "Kamera erisimi gereklidir." Info.plist 2>/dev/null || plutil -insert NSCameraUsageDescription -string "Kamera erisimi gereklidir." Info.plist
          plutil -replace NSPhotoLibraryUsageDescription -string "Galeri erisimi gereklidir." Info.plist 2>/dev/null || plutil -insert NSPhotoLibraryUsageDescription -string "Galeri erisimi gereklidir." Info.plist
          plutil -replace NSSpeechRecognitionUsageDescription -string "Ses tanima gereklidir." Info.plist 2>/dev/null || plutil -insert NSSpeechRecognitionUsageDescription -string "Ses tanima gereklidir." Info.plist
          plutil -replace NSBluetoothAlwaysUsageDescription -string "Bluetooth erisimi gereklidir." Info.plist 2>/dev/null || plutil -insert NSBluetoothAlwaysUsageDescription -string "Bluetooth erisimi gereklidir." Info.plist
          plutil -replace NSBluetoothPeripheralUsageDescription -string "Bluetooth erisimi gereklidir." Info.plist 2>/dev/null || plutil -insert NSBluetoothPeripheralUsageDescription -string "Bluetooth erisimi gereklidir." Info.plist
          plutil -replace NSMotionUsageDescription -string "Barometre erisimi gereklidir." Info.plist 2>/dev/null || plutil -insert NSMotionUsageDescription -string "Barometre erisimi gereklidir." Info.plist
          plutil -replace NSLocalNetworkUsageDescription -string "Yerel ag erisimi gereklidir." Info.plist 2>/dev/null || plutil -insert NSLocalNetworkUsageDescription -string "Yerel ag erisimi gereklidir." Info.plist
          plutil -insert SKAdNetworkItems -array Info.plist 2>/dev/null || true
          plutil -insert SKAdNetworkItems.0 -xml "<dict><key>SKAdNetworkIdentifier</key><string>cstr6suwn9.skadnetwork</string></dict>" Info.plist 2>/dev/null || true

      - name: Podfile ve permission_handler Duzelt
        working-directory: mountaineering_app/ios
        run: |
          ruby -i -e "lines = ARGF.readlines; lines.reject! { |l| l.match?(/platform :ios/) }; puts \"platform :ios, '15.0'\"; puts lines" Podfile
          ruby -i -e "puts ARGF.read.gsub(/IPHONEOS_DEPLOYMENT_TARGET = .*?;/, 'IPHONEOS_DEPLOYMENT_TARGET = 15.0;')" Runner.xcodeproj/project.pbxproj
          ruby -i -e "
            lines = ARGF.read
            patch = %Q(flutter_additional_ios_build_settings(target)\n      if target.name == 'permission_handler_apple'\n        target.build_configurations.each do |config|\n          config.build_settings['GCC_PREPROCESSOR_DEFINITIONS'] ||= ['\$(inherited)']\n          config.build_settings['GCC_PREPROCESSOR_DEFINITIONS'] = [config.build_settings['GCC_PREPROCESSOR_DEFINITIONS']].flatten + ['PERMISSION_LOCATION=1','PERMISSION_NOTIFICATIONS=1','PERMISSION_CAMERA=1','PERMISSION_MICROPHONE=1','PERMISSION_PHOTOS=1','PERMISSION_APP_TRACKING_TRANSPARENCY=1','PERMISSION_SPEECH_RECOGNIZER=1','PERMISSION_BLUETOOTH=1']\n        end\n      end)
            puts lines.gsub('flutter_additional_ios_build_settings(target)', patch)
          " Podfile
          pod repo update
          pod install

      - name: Entitlements ve Bundle Identifier Ayarla
        working-directory: mountaineering_app/ios
        run: |
          printf '<?xml version="1.0" encoding="UTF-8"?>\n<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">\n<plist version="1.0">\n<dict>\n\t<key>com.apple.developer.applesignin</key>\n\t<array>\n\t\t<string>Default</string>\n\t</array>\n</dict>\n</plist>\n' > Runner/Runner.entitlements
          sed -i '' 's/PRODUCT_BUNDLE_IDENTIFIER = .*/PRODUCT_BUNDLE_IDENTIFIER = com.rotaplus.emniyetteyim; DEVELOPMENT_TEAM = TAH5CSWX56; CODE_SIGN_ENTITLEMENTS = Runner\/Runner.entitlements;/g' Runner.xcodeproj/project.pbxproj

      - name: Xcode Bellek Sinirlandir
        run: |
          defaults write com.apple.dt.Xcode IDEBuildOperationMaxNumberOfConcurrentCompileTasks 2
          defaults write com.apple.dt.Xcode PBXNumberOfParallelBuildSubtasks 2

      - name: Flutter iOS Release Build
        working-directory: mountaineering_app
        run: flutter build ios --release --no-codesign


      - name: Ruby Kurulumu
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Fastlane Bagimliliklar
        working-directory: mountaineering_app/ios
        run: bundle install

      - name: TestFlight Upload
        working-directory: mountaineering_app/ios
        env:
          API_KEY_ID: ${{ secrets.API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.API_ISSUER_ID }}
          API_KEY_CONTENT: ${{ secrets.API_KEY_CONTENT }}
          MATCH_KEYCHAIN_NAME: ${{ secrets.MATCH_KEYCHAIN_NAME }}
          MATCH_KEYCHAIN_PASSWORD: ${{ secrets.MATCH_KEYCHAIN_PASSWORD }}
          SIGH_NAME: ${{ secrets.SIGH_NAME }}
        run: bundle exec fastlane beta
