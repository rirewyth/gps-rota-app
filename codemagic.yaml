workflows:
  ios-testflight:
    name: iOS TestFlight Release
    instance_type: mac_mini_m1
    max_build_duration: 120
    integrations:
      app_store_connect: "Cloud Build"
    environment:
      flutter: stable
      xcode: latest
      ruby: default
    scripts:
      - name: Disable Swift Package Manager
        script: |
          flutter config --no-enable-swift-package-manager

      - name: Fetch and Auto-Create iOS Signing Files
        script: |
          app-store-connect fetch-signing-files "com.rotaplus.emniyetteyim" \
            --type IOS_APP_STORE \
            --create

      - name: Get Flutter dependencies
        script: |
          cd mountaineering_app
          flutter pub get

      - name: Create missing iOS files
        script: |
          cd mountaineering_app
          flutter create . --platforms ios

      - name: Generate App Icons and Splash
        script: |
          cd mountaineering_app
          flutter pub run flutter_launcher_icons
          flutter pub run flutter_native_splash:create

      - name: Add Info.plist Keys
        script: |
          cd mountaineering_app/ios/Runner
          plutil -replace ITSAppUsesNonExemptEncryption -bool NO Info.plist 2>/dev/null || plutil -insert ITSAppUsesNonExemptEncryption -bool NO Info.plist
          plutil -replace NSLocationWhenInUseUsageDescription -string "Haritada konumunuzu görebilmek için izin gereklidir." Info.plist 2>/dev/null || plutil -insert NSLocationWhenInUseUsageDescription -string "Haritada konumunuzu görebilmek için izin gereklidir." Info.plist
          plutil -replace NSLocationAlwaysUsageDescription -string "Arka planda acil durum SOS takibi için konumunuz gereklidir." Info.plist 2>/dev/null || plutil -insert NSLocationAlwaysUsageDescription -string "Arka planda acil durum SOS takibi için konumunuz gereklidir." Info.plist
          plutil -replace NSLocationAlwaysAndWhenInUseUsageDescription -string "Arka planda acil durum SOS takibi için konumunuz gereklidir." Info.plist 2>/dev/null || plutil -insert NSLocationAlwaysAndWhenInUseUsageDescription -string "Arka planda acil durum SOS takibi için konumunuz gereklidir." Info.plist
          plutil -replace NSMicrophoneUsageDescription -string "Telsiz özelliği için mikrofon erişimi gereklidir." Info.plist 2>/dev/null || plutil -insert NSMicrophoneUsageDescription -string "Telsiz özelliği için mikrofon erişimi gereklidir." Info.plist
          plutil -replace NSUserTrackingUsageDescription -string "Size daha ilgi çekici ve kişiselleştirilmiş reklamlar gösterebilmek için bu izne ihtiyacımız var." Info.plist 2>/dev/null || plutil -insert NSUserTrackingUsageDescription -string "Size daha ilgi çekici ve kişiselleştirilmiş reklamlar gösterebilmek için bu izne ihtiyacımız var." Info.plist
          plutil -replace NSCameraUsageDescription -string "Kamera ile fotoğraf çekmek için gereklidir." Info.plist 2>/dev/null || plutil -insert NSCameraUsageDescription -string "Kamera ile fotoğraf çekmek için gereklidir." Info.plist
          plutil -replace NSPhotoLibraryUsageDescription -string "Profil fotoğrafı seçmek için gereklidir." Info.plist 2>/dev/null || plutil -insert NSPhotoLibraryUsageDescription -string "Profil fotoğrafı seçmek için gereklidir." Info.plist
          plutil -replace NSSpeechRecognitionUsageDescription -string "Sesli komutları metne çevirmek için gereklidir." Info.plist 2>/dev/null || plutil -insert NSSpeechRecognitionUsageDescription -string "Sesli komutları metne çevirmek için gereklidir." Info.plist
          plutil -replace NSBluetoothAlwaysUsageDescription -string "Yakındaki ekip arkadaşlarıyla çevrimdışı bağlantı kurmak için gereklidir." Info.plist 2>/dev/null || plutil -insert NSBluetoothAlwaysUsageDescription -string "Yakındaki ekip arkadaşlarıyla çevrimdışı bağlantı kurmak için gereklidir." Info.plist
          plutil -replace NSBluetoothPeripheralUsageDescription -string "Yakındaki ekip arkadaşlarıyla çevrimdışı bağlantı kurmak için gereklidir." Info.plist 2>/dev/null || plutil -insert NSBluetoothPeripheralUsageDescription -string "Yakındaki ekip arkadaşlarıyla çevrimdışı bağlantı kurmak için gereklidir." Info.plist
          plutil -replace NSMotionUsageDescription -string "Acil durum ve fırtına uyarısı için barometre / basınç verilerine erişim gereklidir." Info.plist 2>/dev/null || plutil -insert NSMotionUsageDescription -string "Acil durum ve fırtına uyarısı için barometre / basınç verilerine erişim gereklidir." Info.plist
          plutil -replace NSLocalNetworkUsageDescription -string "Çevrimdışı acil durum mesajlaşması (Mesh Network) için yerel ağ erişimi gereklidir." Info.plist 2>/dev/null || plutil -insert NSLocalNetworkUsageDescription -string "Çevrimdışı acil durum mesajlaşması (Mesh Network) için yerel ağ erişimi gereklidir." Info.plist
          plutil -insert SKAdNetworkItems -array Info.plist 2>/dev/null || true
          plutil -insert SKAdNetworkItems.0 -xml "<dict><key>SKAdNetworkIdentifier</key><string>cstr6suwn9.skadnetwork</string></dict>" Info.plist 2>/dev/null || true

      - name: Fix Podfile and Project Target (iOS 15.0)
        script: |
          cd mountaineering_app/ios
          ruby -i -e "lines = ARGF.readlines; lines.reject! { |l| l.match?(/platform :ios/) }; puts \"platform :ios, '15.0'\"; puts lines" Podfile
          ruby -i -e "lines = ARGF.read; lines.gsub!(/flutter_additional_ios_build_settings\\(target\\)/, %Q{flutter_additional_ios_build_settings(target)\n      if target.name == 'permission_handler_apple'\n        target.build_configurations.each do |config|\n          config.build_settings['GCC_PREPROCESSOR_DEFINITIONS'] ||= ['$(inherited)']\n          config.build_settings['GCC_PREPROCESSOR_DEFINITIONS'] = [config.build_settings['GCC_PREPROCESSOR_DEFINITIONS']].flatten + ['PERMISSION_LOCATION=1', 'PERMISSION_NOTIFICATIONS=1', 'PERMISSION_CAMERA=1', 'PERMISSION_MICROPHONE=1', 'PERMISSION_PHOTOS=1', 'PERMISSION_APP_TRACKING_TRANSPARENCY=1', 'PERMISSION_SPEECH_RECOGNIZER=1', 'PERMISSION_BLUETOOTH=1']\n        end\n      end}); puts lines" Podfile
          ruby -i -e "puts ARGF.read.gsub(/IPHONEOS_DEPLOYMENT_TARGET = .*?;/, %{IPHONEOS_DEPLOYMENT_TARGET = 15.0;})" Runner.xcodeproj/project.pbxproj
          pod repo update

      - name: Bundle Identifier and Team
        script: |
          cd mountaineering_app/ios
          sed -i '' 's/PRODUCT_BUNDLE_IDENTIFIER = .*/PRODUCT_BUNDLE_IDENTIFIER = com.rotaplus.emniyetteyim; DEVELOPMENT_TEAM = TAH5CSWX56;/g' Runner.xcodeproj/project.pbxproj

      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles

      - name: Flutter Build iOS
        script: |
          cd mountaineering_app
          flutter build ipa --release --export-options-plist=/Users/builder/export_options.plist
          
    artifacts:
      - mountaineering_app/build/ios/ipa/*.ipa
      
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
