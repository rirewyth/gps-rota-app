workflows:
  build-ios:
    name: Build iOS App
    working_directory: mountaineering_app
    instance_type: mac_mini_m2
    environment:
      groups:
        - ios_credentials
      flutter: default
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.rotaplus.emniyetteyim
    scripts:
      - name: Get Flutter packages
        script: flutter packages pub get
      - name: Build iOS IPA
        script: flutter build ipa --release
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - admin@rotaplus.com
