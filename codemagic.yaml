workflows:
  ios-testflight:
    name: iOS TestFlight Release
    instance_type: mac_mini_m1
    max_build_duration: 120
    environment:
      groups:
        - appstore
      flutter: stable
      xcode: latest
      ruby: default
    scripts:
      - name: Disable Swift Package Manager
        script: |
          flutter config --no-enable-swift-package-manager

      - name: Get Flutter dependencies
        script: |
          cd mountaineering_app
          flutter pub get

      - name: Create missing iOS files
        script: |
          cd mountaineering_app
          flutter create . --platforms ios

      - name: Add Info.plist Keys
        script: |
          cd mountaineering_app/ios/Runner
          plutil -insert ITSAppUsesNonExemptEncryption -bool NO Info.plist
          plutil -insert NSLocationWhenInUseUsageDescription -string "Haritada konumunuzu görebilmek için izin gereklidir." Info.plist
          plutil -insert NSLocationAlwaysUsageDescription -string "Arka planda acil durum SOS takibi için konumunuz gereklidir." Info.plist
          plutil -insert NSLocationAlwaysAndWhenInUseUsageDescription -string "Arka planda acil durum SOS takibi için konumunuz gereklidir." Info.plist
          plutil -insert NSMicrophoneUsageDescription -string "Sesli komutlar ve acil durum dinlemesi için mikrofona erişim gereklidir." Info.plist
          plutil -insert NSCameraUsageDescription -string "Kamera ile fotoğraf çekmek için gereklidir." Info.plist
          plutil -insert NSPhotoLibraryUsageDescription -string "Profil fotoğrafı seçmek için gereklidir." Info.plist
          plutil -insert NSSpeechRecognitionUsageDescription -string "Sesli komutları metne çevirmek için gereklidir." Info.plist
          plutil -insert NSBluetoothAlwaysUsageDescription -string "Yakındaki ekip arkadaşlarıyla çevrimdışı bağlantı kurmak için gereklidir." Info.plist
          plutil -insert NSBluetoothPeripheralUsageDescription -string "Yakındaki ekip arkadaşlarıyla çevrimdışı bağlantı kurmak için gereklidir." Info.plist
          plutil -insert UIBackgroundModes -array Info.plist
          plutil -insert UIBackgroundModes.0 -string "location" Info.plist
          plutil -insert UIBackgroundModes.1 -string "fetch" Info.plist
          plutil -insert UIBackgroundModes.2 -string "remote-notification" Info.plist

      - name: Fix Podfile and Project Target (iOS 15.0)
        script: |
          cd mountaineering_app/ios
          ruby -i -e "lines = ARGF.readlines; lines.reject! { |l| l.match?(/platform :ios/) }; puts \"platform :ios, '15.0'\"; puts lines" Podfile
          ruby -i -e "lines = ARGF.read; lines.gsub!(/flutter_additional_ios_build_settings\\(target\\)/, %Q{flutter_additional_ios_build_settings(target)\n      if target.name == 'permission_handler_apple'\n        target.build_configurations.each do |config|\n          config.build_settings['GCC_PREPROCESSOR_DEFINITIONS'] ||= ['$(inherited)']\n          config.build_settings['GCC_PREPROCESSOR_DEFINITIONS'] = [config.build_settings['GCC_PREPROCESSOR_DEFINITIONS']].flatten + ['PERMISSION_LOCATION=1', 'PERMISSION_NOTIFICATIONS=1', 'PERMISSION_CAMERA=1', 'PERMISSION_MICROPHONE=1', 'PERMISSION_PHOTOS=1']\n        end\n      end}); puts lines" Podfile
          ruby -i -e "puts ARGF.read.gsub(/IPHONEOS_DEPLOYMENT_TARGET = .*?;/, %{IPHONEOS_DEPLOYMENT_TARGET = 15.0;})" Runner.xcodeproj/project.pbxproj
          pod repo update

      - name: Bundle Identifier and Team Settings
        script: |
          cd mountaineering_app/ios
          sed -i '' 's/PRODUCT_BUNDLE_IDENTIFIER = .*/PRODUCT_BUNDLE_IDENTIFIER = com.rotaplus.emniyetteyim; DEVELOPMENT_TEAM = TAH5CSWX56;/g' Runner.xcodeproj/project.pbxproj

      - name: Install Ruby Dependencies (Fastlane)
        script: |
          cd mountaineering_app/ios
          bundle install

      - name: Flutter Build iOS (Compile Dart & Install Pods)
        script: |
          cd mountaineering_app
          flutter build ios --release --no-codesign

      - name: Build and Upload to TestFlight via Fastlane
        script: |
          cd mountaineering_app/ios
          bundle exec fastlane beta
