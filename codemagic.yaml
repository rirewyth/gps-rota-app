workflows:
  flutter-ios:
    name: Flutter iOS Build (Signed)
    working_directory: mountaineering_app
    instance_type: mac_mini_m2
    environment:
      groups:
        - ios_credentials
      flutter: default
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install Apple Certificate
        script: |
          KEYCHAIN_PATH=$HOME/Library/Keychains/login.keychain-db
          if ! security import ios_distribution.p12 -k $KEYCHAIN_PATH -P 123456 -T /usr/bin/codesign; then
            echo "Import failed with 123456, trying empty password..."
            security import ios_distribution.p12 -k $KEYCHAIN_PATH -P "" -T /usr/bin/codesign
          fi
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" $KEYCHAIN_PATH
      - name: Install Provisioning Profile
        script: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(grep -aA1 UUID Rota_App_Store_Profile.mobileprovision | grep -o "[-A-Z0-9]\{36\}")
          cp Rota_App_Store_Profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision
      - name: Generate Export Options
        script: |
          cat <<EOF > $HOME/export_options.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.rotaplus.emniyetteyim</key>
                  <string>Rota App Store Profile</string>
              </dict>
              <key>signingCertificate</key>
              <string>Apple Distribution</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>teamID</key>
              <string>TAH5CSWX56</string>
          </dict>
          </plist>
          EOF
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Build iOS IPA
        script: |
          flutter build ipa --release --export-options-plist=$HOME/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: false
