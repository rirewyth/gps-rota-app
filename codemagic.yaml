workflows:
  flutter-ios:
    name: Flutter iOS Build (Signed)
    working_directory: mountaineering_app
    instance_type: mac_mini_m2
    environment:
      groups:
        - ios_credentials
      flutter: default
      xcode: latest
      cocoapods: default
    scripts:
      - name: Initialize keychain
        script: |
          keychain initialize
      - name: Fetch and create signing files
        script: |
          app-store-connect fetch-signing-files "com.rotaplus.emniyetteyim" \
            --type IOS_APP_STORE \
            --create
      - name: Add certificates to keychain
        script: |
          keychain add-certificates
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Pod install
        script: |
          cd ios
          pod install
      - name: Build iOS IPA
        script: |
          flutter build ipa --release
    artifacts:
      - build/ios/ipa/*.ipa
